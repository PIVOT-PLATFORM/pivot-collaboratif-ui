sonar.projectKey=PIVOT-PLATFORM_pivot-collaboratif-ui
sonar.organization=pivot-platform
sonar.projectName=pivot-collaboratif-ui

sonar.sources=src,projects/collaboratif-ui/src
sonar.tests=src,projects/collaboratif-ui/src
sonar.test.inclusions=**/*.spec.ts

# EN17.9 — projects/collaboratif-ui/src/lib est la source de vérité du code whiteboard
# (déménagé depuis src/app/whiteboard et src/app/core/whiteboard, voir ce repo CLAUDE.md /
# sonar.sources ci-dessus) ; sans son propre lcov, ce code disparaîtrait silencieusement de
# l'analyse SonarCloud malgré une CI verte.
sonar.javascript.lcov.reportPaths=coverage/lcov.info,coverage/frontend/lcov.info,coverage/collaboratif-ui/lcov.info

sonar.exclusions=**/node_modules/**,dist/**,coverage/**,**/*.spec.ts
sonar.test.exclusions=**/node_modules/**,dist/**
sonar.coverage.exclusions=**/node_modules/**,dist/**,coverage/**,**/*.spec.ts,**/app.routes.ts,**/app.config.ts,**/environments/**

sonar.sourceEncoding=UTF-8
