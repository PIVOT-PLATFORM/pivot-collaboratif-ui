name: Publish @pivot-platform/collaboratif-ui

on:
  push:
    branches: [main]
    tags: ['v[0-9]+.[0-9]+.[0-9]+']

concurrency:
  group: publish-collaboratif-ui-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish @pivot-platform/collaboratif-ui
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@pivot-platform'

      - name: Install dependencies
        run: npm ci

      - name: Build collaboratif-ui library
        run: npm run build:collaboratif-ui

      - name: Set package version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm --prefix dist/collaboratif-ui version "$VERSION" --no-git-tag-version

      - name: Publish to GitHub Packages (idempotent — skip if this version already exists)
        # This job runs on every push to main (see `on:` above — no git-tag convention exists for
        # this package, confirmed: `projects/collaboratif-ui/package.json`'s version has been
        # "0.1.0" since the one commit that set it, #36; no release/tag has bumped it since), but
        # `npm publish` hard-fails if that exact version is already on the registry — which it is,
        # after the very first successful publish. Every ordinary merge after that point failed
        # here with "cannot publish over the previously published version". Skip gracefully
        # instead of failing when the current version is already published; a real version bump in
        # package.json still publishes normally.
        run: |
          PKG_VERSION=$(node -p "require('./dist/collaboratif-ui/package.json').version")
          if npm view "@pivot-platform/collaboratif-ui@${PKG_VERSION}" version 2>/dev/null; then
            echo "::notice::${PKG_VERSION} already published — skipping (no version bump since last publish)."
          else
            npm publish ./dist/collaboratif-ui
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
