name: SBOM

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: >-
          Tag semver de l'image à scanner (sans préfixe v, ex. 1.2.3) — requis hors contexte
          `release: published` (github.event.release.tag_name absent en déclenchement manuel).
        required: false
        type: string

permissions: read-all

jobs:
  sbom:
    name: SBOM - CycloneDX (npm)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node.js 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies (sans scripts)
        run: npm ci --ignore-scripts

      - name: Generate SBOM - Frontend (npm CycloneDX)
        run: |
          npm sbom \
            --omit dev \
            --package-lock-only \
            --sbom-format cyclonedx \
            --sbom-type application \
            > sbom-frontend.cdx.json

      - name: Fetch previous release SBOM (diff)
        id: prev
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV_TAG=$(gh release list --limit 2 --json tagName --jq '.[1].tagName // ""')
          echo "prev_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"

          if [ -n "$PREV_TAG" ]; then
            gh release download "$PREV_TAG" \
              --pattern "sbom-frontend.cdx.json" \
              --output sbom-frontend-prev.cdx.json 2>/dev/null \
              && echo "prev_frontend=true" >> "$GITHUB_OUTPUT" \
              || echo "prev_frontend=false" >> "$GITHUB_OUTPUT"
          else
            echo "prev_frontend=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Diff SBOM vs release precedente
        env:
          PREV_FRONTEND: ${{ steps.prev.outputs.prev_frontend }}
          PREV_TAG: ${{ steps.prev.outputs.prev_tag }}
        run: |
          python3 - <<'PYEOF'
          import json, os

          def load(path):
              try:
                  with open(path) as f:
                      data = json.load(f)
                  return {c['name']: c.get('version', '?') for c in data.get('components', [])}
              except Exception:
                  return {}

          def diff_report(label, prev_path, curr_path, out):
              prev = load(prev_path)
              curr = load(curr_path)
              if not prev:
                  return
              added   = {k: curr[k] for k in curr if k not in prev}
              removed = {k: prev[k] for k in prev if k not in curr}
              changed = {k: (prev[k], curr[k]) for k in curr if k in prev and curr[k] != prev[k]}
              tag = os.environ.get("PREV_TAG", "previous release")
              out.write(f'## {label} SBOM diff (vs {tag})\n\n')
              if not (added or removed or changed):
                  out.write('Aucun changement de dependances.\n\n')
                  return
              for k, v in sorted(added.items()):
                  out.write(f'+ {k}  {v}\n')
              for k, v in sorted(removed.items()):
                  out.write(f'- {k}  {v}\n')
              for k, (o, n) in sorted(changed.items()):
                  out.write(f'~ {k}  {o} -> {n}\n')
              out.write('\n')

          summary_path = os.environ.get('GITHUB_STEP_SUMMARY', '/dev/stdout')
          with open(summary_path, 'a') as out:
              if os.environ.get('PREV_FRONTEND') == 'true':
                  diff_report('Frontend (Angular/npm)', 'sbom-frontend-prev.cdx.json', 'sbom-frontend.cdx.json', out)
          PYEOF

      - name: Upload SBOM as CI artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-${{ github.event.release.tag_name || github.sha }}
          path: sbom-frontend.cdx.json
          retention-days: 365

      - name: Attach SBOM to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            sbom-frontend.cdx.json \
            --clobber

  # -----------------------------------------
  # SBOM CONTAINER IMAGE — couvre l'image Docker publiée (couches OS, binaires nginx, etc.),
  # angle mort du SBOM npm ci-dessus qui ne couvre que les dépendances applicatives.
  # Trivy est déjà l'outil SCA/scan de ce repo (ci.yml, release.yml, pr-checks.yml) — réutilisé
  # ici en mode SBOM plutôt que d'introduire un nouvel outil (Syft/anchore).
  #
  # Référence d'image : tag semver `${VERSION}`, pas `:latest` (retiré — interdit en déploiement
  # par .plumber.yaml, containerImageMustNotUseForbiddenTags) ni `${GITHUB_SHA}` (release.yml
  # pousse l'image avec le SHA du commit qui a déclenché le build, MAIS semantic-release (plugin
  # @semantic-release/git) commite ensuite CHANGELOG.md/package.json sur main et TAG ce nouveau
  # commit — le tag de release ne pointe donc jamais sur le SHA utilisé pour builder/pousser
  # l'image). release.yml pousse désormais aussi `${IMAGE}:${VERSION}` (VERSION = version calculée
  # par semantic-release, sans préfixe `v`) — le seul pointeur stable et déjà publié au moment où
  # ce job SBOM tourne (déclenché par `release: published`, donc après ce push). On dérive VERSION
  # depuis `github.event.release.tag_name` en retirant le préfixe `v` du tag Git par défaut
  # (`@semantic-release/github`, tagFormat `v${version}`) — ISO pivot-core/deploy.yml
  # (`VERSION="${RELEASE_TAG#v}"`).
  # -----------------------------------------
  sbom-container:
    name: SBOM - Container Image (Trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      packages: read

    steps:
      - name: Determine image reference
        id: image
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          DISPATCH_VERSION: ${{ github.event.inputs.version }}
        run: |
          # ISO release.yml (job `release`, step "Build & load Docker image") : pas de suffixe
          # "/pivot-collaboratif-ui" — GITHUB_REPOSITORY contient déjà le nom du repo.
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          if [ -n "${DISPATCH_VERSION:-}" ]; then
            VERSION="${DISPATCH_VERSION#v}"
          else
            VERSION="${RELEASE_TAG#v}"
          fi
          if [ -z "${VERSION}" ]; then
            echo "::error::Impossible de résoudre le tag semver de l'image — ni github.event.release.tag_name (déclenchement release) ni l'input 'version' (workflow_dispatch) ne sont renseignés."
            exit 1
          fi
          echo "ref=${IMAGE}:${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SBOM - Container image (Trivy CycloneDX)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.image.outputs.ref }}
          format: cyclonedx
          output: sbom-container.cdx.json

      - name: Upload SBOM as CI artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-container-${{ github.event.release.tag_name || github.sha }}
          path: sbom-container.cdx.json
          retention-days: 365

      - name: Attach SBOM to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            sbom-container.cdx.json \
            --repo "${{ github.repository }}" \
            --clobber
