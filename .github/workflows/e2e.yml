name: E2E

# Tests E2E Playwright contre une stack pivot-collaboratif-core reelle (image GHCR + postgres +
# redis). Pas un required status check ici (voir TODO-SETUP.md — pas encore ajoute a la liste des
# required checks). Le package GHCR pivot-collaboratif-core est prive — l'acces cross-repo Actions
# a ete accorde a ce repo le 2026-07-09 (Package settings > Manage Actions access), levant le
# "denied" qui bloquait `docker run` depuis la premiere image publiee (v0.1.0/v1.0.0).

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  # NOT ghcr.io/<owner>/pivot-collaboratif-core/pivot-collaboratif-core — the repo name isn't
  # repeated (that doubled-path bug, same one fixed on pivot-core and pivot-ui, was itself
  # fixed in pivot-collaboratif-core's release.yml, v0.1.1).
  #
  # No tag here anymore — pivot-collaboratif-core#56 removed the forbidden mutable `:latest`
  # tag (`.plumber.yaml` containerImageMustNotUseForbiddenTags). The tag is resolved dynamically
  # per-run below (step "Resolve pivot-collaboratif-core image tag").
  CORE_IMAGE: ghcr.io/pivot-platform/pivot-collaboratif-core

jobs:
  e2e:
    name: E2E - Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: read

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: pivot_e2e
          POSTGRES_USER: pivot
          POSTGRES_PASSWORD: pivot_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U pivot -d pivot_e2e"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve pivot-collaboratif-core image tag
        # pivot-collaboratif-core's release.yml only pushes ${GITHUB_SHA}/${VERSION} image tags
        # from its `release` job, itself gated on an explicit "Release-Trigger: true" commit
        # trailer (pivot-collaboratif-core/CLAUDE.md, "Workflow — Release") — NOT on every push
        # to main. Resolving main's HEAD commit SHA (e.g. via `gh api .../commits/main`) and
        # assuming a matching image tag exists is unsound: verified empirically 2026-07-10,
        # main's HEAD there is itself the semantic-release "chore(release): x.y.z [skip ci]"
        # commit pushed by @semantic-release/git AFTER the image build/push, so it has no
        # matching ${GITHUB_SHA} tag in GHCR at all — pulling it would reproduce the exact
        # "manifest unknown" failure this fix is meant to remove (see issue #39).
        #
        # The reliable, always-published reference is the latest GitHub Release's tag_name —
        # release.yml tags+pushes ${IMAGE}:${VERSION} in the SAME job that creates the GitHub
        # Release, so this tag is guaranteed to exist in GHCR whenever the Releases API returns
        # it. It's also public-repo metadata (pivot-collaboratif-core is a public repo), so no
        # extra token scope beyond the default GITHUB_TOKEN is needed to read it.
        #
        # This has the exact same freshness cadence the old `:latest` tag had (both were pushed
        # together, in the same release job run) — no regression versus the pre-#56 behaviour,
        # just an immutable tag instead of a forbidden mutable one. It does mean E2E here always
        # lags behind pivot-collaboratif-core's actual main branch until that repo publishes an
        # image on every merge instead of only at end-of-sprint release — same known gap as
        # TODO-SETUP.md Bloquant #2 / issue #39, now made explicit instead of silently assumed.
        id: core-image
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME=$(gh api repos/PIVOT-PLATFORM/pivot-collaboratif-core/releases/latest --jq .tag_name)
          if [ -z "${TAG_NAME}" ] || [ "${TAG_NAME}" = "null" ]; then
            echo "::error::Could not resolve pivot-collaboratif-core's latest GitHub Release tag_name — no release published yet?"
            exit 1
          fi
          VERSION="${TAG_NAME#v}"
          echo "::warning::E2E runs against pivot-collaboratif-core's latest RELEASED image (${VERSION}), not the HEAD of its main branch — that repo only publishes images at end-of-sprint release (see its CLAUDE.md, 'Workflow — Release'). Signal here will lag behind pivot-collaboratif-core's own main until it publishes an image on every merge (tracked: TODO-SETUP.md Bloquant #2 / issue #39)."
          echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Seed public schema + real bearer token (pivot-core mirror)
        # EN08.3 (pivot-collaboratif-core#46) added real FK constraints from collaboratif.board/
        # canvas_event/board_member/board_share_token/whiteboard_template into public.tenants(id)/
        # public.users(id) — owned by pivot-core's own Flyway, never run in this E2E stack. Without
        # these tables, collaboratif-core's own Flyway migration (V1__schema_init.sql) fails with
        # "relation public.tenants does not exist" and the container never becomes healthy.
        #
        # A minimal empty-tables seed is enough for that, but EN08.3 also replaced the old
        # X-Pivot-User-Id header stub with real bearer-token validation — and this repo's own
        # frontend has NO auth interceptor (CLAUDE.md, "Auth (différée)": no AuthService/
        # AuthInterceptor exists here, deferred until @pivot-platform/ui-core is published). Any
        # spec exercising a real API call (board creation, canvas, etc. — not just app.e2e.spec.ts's
        # trivial "app loads") needs a request carrying a token collaboratif-core will actually
        # accept. Rather than reimplementing an Angular-side auth mechanism (explicitly forbidden
        # by this repo's own CLAUDE.md — "doit venir exclusivement de @pivot-platform/ui-core"),
        # this stays entirely inside the E2E harness: seed one real user/tenant/access_token row
        # (same shape TokenValidationService reads — see PlatformUser/PlatformTenant/
        # PlatformAccessToken in pivot-collaboratif-core) and have Playwright itself attach the
        # matching bearer token to every request (playwright.config.ts, extraHTTPHeaders).
        id: seed
        env:
          PGPASSWORD: pivot_e2e
        run: |
          RAW_TOKEN=$(openssl rand -hex 32)
          TOKEN_HASH=$(printf '%s' "$RAW_TOKEN" | sha256sum | cut -d' ' -f1)
          psql -h localhost -U pivot -d pivot_e2e -c "
            CREATE TABLE IF NOT EXISTS public.tenants (
              id BIGSERIAL PRIMARY KEY,
              tenant_invalidation_timestamp TIMESTAMPTZ
            );
            CREATE TABLE IF NOT EXISTS public.users (
              id BIGSERIAL PRIMARY KEY,
              tenant_id BIGINT NOT NULL,
              role VARCHAR(50) NOT NULL,
              is_active BOOLEAN NOT NULL DEFAULT true
            );
            CREATE TABLE IF NOT EXISTS public.access_tokens (
              id BIGSERIAL PRIMARY KEY,
              user_id BIGINT NOT NULL,
              token_hash VARCHAR(64) NOT NULL,
              status VARCHAR(10) NOT NULL,
              expires_at TIMESTAMPTZ NOT NULL,
              created_at TIMESTAMPTZ NOT NULL DEFAULT now()
            );
            INSERT INTO public.tenants (id) VALUES (1) ON CONFLICT (id) DO NOTHING;
            INSERT INTO public.users (id, tenant_id, role, is_active)
              VALUES (1, 1, 'ROLE_USER', true) ON CONFLICT (id) DO NOTHING;
            INSERT INTO public.access_tokens (user_id, token_hash, status, expires_at)
              VALUES (1, '${TOKEN_HASH}', 'active', now() + interval '1 day');
          "
          echo "::add-mask::${RAW_TOKEN}"
          echo "raw_token=${RAW_TOKEN}" >> "$GITHUB_OUTPUT"

      - name: Start pivot-collaboratif-core (E2E seed profile)
        run: |
          docker run -d --name pivot-collaboratif-core \
            --network ${{ job.services.postgres.network }} \
            -p 8083:8083 \
            -e SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/pivot_e2e \
            -e SPRING_DATASOURCE_USERNAME=pivot \
            -e SPRING_DATASOURCE_PASSWORD=pivot_e2e \
            -e SPRING_DATA_REDIS_HOST=redis \
            -e SPRING_DATA_REDIS_PORT=6379 \
            -e SPRING_PROFILES_ACTIVE=test \
            ${{ env.CORE_IMAGE }}:${{ steps.core-image.outputs.tag }}

      - name: Wait for pivot-collaboratif-core
        run: |
          curl --retry 40 --retry-delay 3 --retry-connrefused --retry-all-errors \
            --fail --silent --show-error --output /dev/null \
            http://localhost:8083/api/collaboratif/actuator/health

      - name: Setup Node.js 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Angular (CI config — apiUrl http://localhost:8083)
        # Config `ci` = optimisations prod SANS le fileReplacement vers /api.
        # L'app sert sur :4200 (serve, pas de proxy) et appelle le backend :8083 directement.
        # La config `production` (image Docker/nginx) utilise /api/collaboratif proxifié.
        run: npm run build -- --configuration ci

      - name: Serve Angular build
        # Projet Angular = "frontend" (pas d'outputPath custom dans angular.json) → dist/frontend/browser.
        run: npx --yes serve dist/frontend/browser -p 4200 --single &

      - name: Run Playwright
        env:
          PIVOT_API_URL: http://localhost:8083
          E2E_BEARER_TOKEN: ${{ steps.seed.outputs.raw_token }}
        run: npx playwright test --project=chromium

      - name: Dump pivot-collaboratif-core logs on failure
        if: failure()
        run: docker logs pivot-collaboratif-core || true

      - name: Stop pivot-collaboratif-core
        if: always()
        run: docker rm -f pivot-collaboratif-core || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
