name: Release

on:
  push:
    branches: [main]

permissions: read-all

jobs:
  # -----------------------------------------
  # 0. CHECK RELEASE TRIGGER — le trailer doit apparaître comme une LIGNE ENTIÈRE et EXACTE
  #    du message de commit (`grep -qxE`, pas une sous-chaîne `contains()`). Sans cette
  #    exactitude, toute prose qui *mentionne* le trailer (doc, PR décrivant la fonctionnalité,
  #    ce fichier lui-même) le fait matcher par accident. Voir pivot-collaboratif-ui/CLAUDE.md,
  #    section Workflow — Release (et l'incident réel documenté sur pivot-core/CLAUDE.md et
  #    pivot-ui/CLAUDE.md qui a motivé cette règle).
  # -----------------------------------------
  check-release-trigger:
    name: Check release trigger
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    outputs:
      trigger: ${{ steps.check.outputs.trigger }}
    permissions:
      contents: read
    steps:
      - name: Check for exact Release-Trigger trailer line
        id: check
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if printf '%s\n' "$COMMIT_MSG" | grep -qxE 'Release-Trigger: true'; then
            echo "trigger=true" >> "$GITHUB_OUTPUT"
          else
            echo "trigger=false" >> "$GITHUB_OUTPUT"
          fi

  # -----------------------------------------
  # 1. PREPARE — calcule la version SANS créer la release (dry-run), avec des permissions
  #    MINIMALES (contents: read). ISO pivot-core.
  # -----------------------------------------
  prepare:
    name: Compute release version
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [check-release-trigger]
    if: needs.check-release-trigger.outputs.trigger == 'true'
    outputs:
      version: ${{ steps.version.outputs.version }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}

      - name: Setup Node.js 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Semantic Release
        run: npm install --save-dev semantic-release @semantic-release/changelog @semantic-release/git @semantic-release/exec

      - name: Compute next version (dry-run)
        id: version
        env:
          GITHUB_TOKEN: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}
        run: npx semantic-release --dry-run

  # -----------------------------------------
  # 2. RELEASE — build à la version finale, scan AVANT push, publie l'image (Docker + npm).
  #    Ne tourne que si `prepare` a déterminé une version.
  #
  #    NE crée PLUS le tag/la GitHub Release (déplacé vers le job `create-release`, en fin de
  #    workflow, APRÈS `provenance-container`) — voir le commentaire du job `create-release`
  #    ci-dessous pour le pourquoi (race condition SLSA corrigée ici).
  #
  #    SLSA L3 : id-token et attestations sont ABSENTS de ce job (le build ne peut
  #    pas forger sa propre provenance). Ils sont accordés uniquement au job
  #    provenance-container.
  # -----------------------------------------
  release:
    name: Build, scan, publish & release
    runs-on: ubuntu-latest
    needs: [prepare]
    if: needs.prepare.outputs.version != ''
    timeout-minutes: 30
    outputs:
      image:  ${{ steps.build-docker.outputs.image_name }}
      digest: ${{ steps.push.outputs.digest }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: write
      security-events: write
      # id-token et attestations : accordés UNIQUEMENT au job de provenance (SLSA L3).
    env:
      VERSION: ${{ needs.prepare.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}

      - name: Setup Node.js 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Semantic Release
        run: npm install --save-dev semantic-release @semantic-release/changelog @semantic-release/git @semantic-release/exec

      - name: Build Angular (production)
        run: npm run build -- --configuration production

      - name: Build collaboratif-ui library
        run: npm run build:collaboratif-ui

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & load Docker image (amd64)
        id: build-docker
        run: |
          # GITHUB_REPOSITORY vaut déjà "pivot-platform/pivot-collaboratif-ui" — ne PAS
          # ré-ajouter "/pivot-collaboratif-ui" en suffixe (bug corrigé ici, EN07.5 : ce repo
          # publiait jusque-là à ghcr.io/pivot-platform/pivot-collaboratif-ui/pivot-collaboratif-ui,
          # segment de repo dupliqué). ISO pivot-core/pivot-ui (`IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"`).
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "IMAGE_REF=${IMAGE}:${GITHUB_SHA}" >> "$GITHUB_ENV"
          # tag semver stable, en plus de GITHUB_SHA : le tag Git / la GitHub Release que
          # deploy.yml observe (déclenché par `release: published`) pointe sur le commit de
          # bump créé plus bas par @semantic-release/git (package.json/CHANGELOG.md), PAS sur
          # GITHUB_SHA (le commit buildé ici). Sans ce tag, deploy.yml n'a aucune façon fiable
          # de retrouver l'image de cette release — et `latest` a été retiré (interdit en
          # déploiement par .plumber.yaml, containerImageMustNotUseForbiddenTags). ISO pivot-core.
          echo "IMAGE_VERSION=${IMAGE}:${VERSION}" >> "$GITHUB_ENV"
          echo "image_name=${IMAGE}" >> "$GITHUB_OUTPUT"
          docker buildx build --platform linux/amd64 --load \
            -t "${IMAGE}:${GITHUB_SHA}" \
            -t "${IMAGE}:${VERSION}" \
            .

      - name: Scan Docker image - Trivy (gate avant push)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_REF }}
          format: sarif
          output: trivy-ui.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      - name: Upload Trivy SARIF
        if: always() && hashFiles('trivy-ui.sarif') != ''
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: trivy-ui.sarif
          category: trivy-container

      - name: Push Docker image (scan OK)
        id: push
        run: |
          docker push "${IMAGE_VERSION}"
          PUSH_OUT=$(docker push "${IMAGE_REF}" 2>&1)
          printf '%s\n' "${PUSH_OUT}"
          DIGEST=$(printf '%s\n' "${PUSH_OUT}" | grep -oE 'sha256:[a-f0-9]{64}' | tail -1)
          if [ -z "${DIGEST}" ]; then
            echo "::error::Digest introuvable après push — impossible d'attester l'image (SLSA L3)."
            exit 1
          fi
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Set @pivot-platform/collaboratif-ui package version
        run: npm --prefix dist/collaboratif-ui version "$VERSION" --no-git-tag-version

      - name: Publish @pivot-platform/collaboratif-ui to GitHub Packages
        # Same version as the Docker image tag above ($VERSION, from `prepare`'s semantic-release
        # dry-run) — published BEFORE the tag/release is created below, mirroring pivot-core's
        # release.yml (Maven `deploy_jar`). Fixes the library staying frozen at 0.1.0 forever:
        # the previous separate publish-collaboratif-ui.yml relied on `on: push: tags: [...]`,
        # which never fires — semantic-release creates tags/releases via the GitHub REST API,
        # not `git push --tags`, so no `push` event on refs/tags/* is ever emitted (confirmed via
        # GitHub Packages: 0.1.0 was the only version ever published despite tags up to v0.1.1;
        # same dead trigger independently confirmed on pivot-ui/publish-ui-core.yml, frozen at
        # 0.1.0 despite 28 tags). Idempotent (409/already-exists tolerated) for safe re-runs.
        run: |
          if npm view "@pivot-platform/collaboratif-ui@${VERSION}" version 2>/dev/null; then
            echo "::notice::${VERSION} already published — skipping (idempotent re-run)."
          else
            npm publish ./dist/collaboratif-ui
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # -----------------------------------------
  # 3. PROVENANCE CONTAINER — génère et signe la provenance SLSA L3 pour l'image Docker.
  #    id-token: write est ici, pas dans `release` → le build ne peut pas forger sa
  #    propre provenance (différence clé L2 → L3).
  #    Attache l'attestation en tant qu'artefact OCI dans GHCR via cosign.
  #
  # -----------------------------------------
  provenance-container:
    name: SLSA provenance — Docker (L3)
    needs: [release]
    permissions:
      id-token: write
      packages: write
      actions: read
    # Réf en TAG (@v2.1.0) et NON en SHA : avec compile-generator: false le binaire est
    # téléchargé depuis la Release au ref détecté par detect-env (via OIDC job_workflow_ref).
    # builder-fetch.sh exige refs/tags/vX.Y.Z ; un SHA brut → exit 2 → binaire absent →
    # exit 127 → upload-artifact sans chemin → SUCCESS=false → échec final 27.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: ${{ needs.release.outputs.image }}
      digest: ${{ needs.release.outputs.digest }}
    secrets:
      # registry-username + registry-password : noms attendus par generator_container_slsa3.yml
      # (slsa-framework/slsa-github-generator v2.1.0, utilise docker/login-action en interne).
      registry-username: ${{ github.actor }}
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  # -----------------------------------------
  # 4. CREATE RELEASE — crée le tag Git + la GitHub Release (`npx semantic-release`, non
  #    dry-run), UNIQUEMENT une fois `provenance-container` terminé (attestation SLSA
  #    réellement publiée sur GHCR).
  #
  #    Pourquoi ce découpage (bug réel, confirmé run 29247202054) : ce step vivait auparavant en
  #    dernière étape du job `release`. `release: published` (déclencheur event-based de
  #    deploy.yml ET sbom.yml) part IMMÉDIATEMENT quand semantic-release crée la Release via
  #    l'API REST — soit ~30s AVANT que `provenance-container` (needs: [release], démarre en
  #    parallèle de la fin de `release`) ait fini de signer/publier l'attestation OCI sur GHCR.
  #    deploy.yml échouait alors systématiquement en HTTP 404 sur son step "Verify build
  #    provenance (SLSA L3 attestation)" (`gh attestation verify`) : les 4 releases de ce repo
  #    (v0.1.0 → v0.3.0) ont TOUTES échoué ainsi. En ne créant le tag/la Release qu'après
  #    `needs: [release, provenance-container]`, `release: published` ne part plus qu'une fois
  #    l'attestation effectivement disponible.
  #
  #    Environnement : reproduit celui du job `prepare` (checkout fetch-depth 0 + Node 24 +
  #    devDependencies semantic-release), PAS celui de `release` — semantic-release ne consomme
  #    aucun artefact buildé ici (dist/, image Docker), seulement l'historique Git complet et son
  #    propre outillage. Version recalculée de façon déterministe à partir des mêmes commits que
  #    le dry-run de `prepare` (aucun nouveau commit poussé sur `main` entre-temps par ce
  #    workflow) — comportement déjà supposé par la conception précédente (le job `release`
  #    taguait déjà l'image Docker avec la version du dry-run AVANT que le vrai `npx
  #    semantic-release` ne tourne).
  #
  #    Permissions minimales, distinctes de celles de `release` : contents: write (tag + Release
  #    + commit `chore(release): ... [skip ci]` via @semantic-release/git), issues/pull-requests:
  #    write (@semantic-release/github — successComment: false dans .releaserc.json désactive
  #    seulement le commentaire de succès, pas les autres opérations du plugin qui touchent
  #    issues/PR référencées). PAS packages: write (npm publish + docker push restent dans
  #    `release`, déjà faits à ce stade) ni id-token/attestations (réservés à
  #    provenance-container).
  # -----------------------------------------
  create-release:
    name: Create GitHub Release (post-provenance)
    runs-on: ubuntu-latest
    needs: [release, provenance-container]
    timeout-minutes: 15
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}

      - name: Setup Node.js 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Semantic Release
        run: npm install --save-dev semantic-release @semantic-release/changelog @semantic-release/git @semantic-release/exec

      - name: Semantic Release (create tag + release)
        env:
          GITHUB_TOKEN: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}
        run: npx semantic-release

  # Le déploiement prod vit dans deploy.yml, déclenché `on: release: published` (event-based)
  # → jamais "skipped", et conserve `environment: production`. sbom.yml se déclenche aussi sur
  # `release: published` (job `sbom`, `gh release upload`) — non affecté négativement par ce
  # découpage : il ne dépend d'aucun artefact de `create-release` autre que la Release elle-même
  # (qui existe déjà quand l'event part), et tourne même EN MEILLEURE POSITION qu'avant, puisque
  # l'attestation SLSA est désormais garantie publiée au moment où l'event part.
