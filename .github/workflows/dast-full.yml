name: DAST - Full Scan (ISO prod)

# ZAP Full Scan sur stack complete du module Collaboratif (pivot-collaboratif-core image GHCR
# + Angular build). Copie structurelle du dast-full.yml de pivot-ui (memes noms de job, pour
# parite de status-check si jamais requis un jour) — ADAPTATION INCOMPLETE, bootstrap only :
# le flux d'authentification ci-dessous (POST /api/auth/login, JWT_SECRET) suppose un login
# local qui n'existe pas dans ce module (l'auth vit exclusivement dans pivot-core, consommee
# via fr.pivot:pivot-core-starter une fois publie — voir CLAUDE.md). A reecrire une fois
# l'integration reelle avec les opaque tokens pivot-core decidee.
# Credentials seed (donnees mock - jamais en production) :
#   user  : dast-user@pivot.local  / Pivot@DastTest1!
#   admin : dast-admin@pivot.local / Pivot@DastTest1!

# DESACTIVE - necessite pivot-collaboratif-core image publiee sur GHCR + secrets configures.
on:
  workflow_dispatch:

permissions: read-all

env:
  # No tag here anymore — pivot-collaboratif-core#56 removed the forbidden mutable `:latest`
  # tag (`.plumber.yaml` containerImageMustNotUseForbiddenTags). Resolved dynamically once by
  # the `resolve-core-tag` job below (see that job for why HEAD-of-main-SHA resolution doesn't
  # actually work here) and shared by both ZAP jobs.
  CORE_IMAGE: ghcr.io/pivot-platform/pivot-collaboratif-core

jobs:
  #
  # JOB 0 - Resolve pivot-collaboratif-core image tag (shared by both ZAP jobs below)
  #
  resolve-core-tag:
    name: Resolve pivot-collaboratif-core image tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.core-image.outputs.tag }}
    steps:
      - name: Resolve pivot-collaboratif-core image tag
        # pivot-collaboratif-core's release.yml only pushes ${GITHUB_SHA}/${VERSION} image tags
        # from its `release` job, itself gated on an explicit "Release-Trigger: true" commit
        # trailer (pivot-collaboratif-core/CLAUDE.md, "Workflow — Release") — NOT on every push
        # to main. Resolving main's HEAD commit SHA (e.g. via `gh api .../commits/main`) and
        # assuming a matching image tag exists is unsound: verified empirically 2026-07-10,
        # main's HEAD there is itself the semantic-release "chore(release): x.y.z [skip ci]"
        # commit pushed by @semantic-release/git AFTER the image build/push, so it has no
        # matching ${GITHUB_SHA} tag in GHCR at all — pulling it would reproduce the exact
        # "manifest unknown" failure this fix is meant to remove (see issue #39).
        #
        # The reliable, always-published reference is the latest GitHub Release's tag_name —
        # release.yml tags+pushes ${IMAGE}:${VERSION} in the SAME job that creates the GitHub
        # Release, so this tag is guaranteed to exist in GHCR whenever the Releases API returns
        # it. It's also public-repo metadata (pivot-collaboratif-core is a public repo), so no
        # extra token scope beyond the default GITHUB_TOKEN is needed to read it.
        #
        # This has the exact same freshness cadence the old `:latest` tag had (both were pushed
        # together, in the same release job run) — no regression versus the pre-#56 behaviour,
        # just an immutable tag instead of a forbidden mutable one. It does mean DAST here always
        # lags behind pivot-collaboratif-core's actual main branch until that repo publishes an
        # image on every merge instead of only at end-of-sprint release — same known gap as
        # TODO-SETUP.md Bloquant #2 / issue #39, now made explicit instead of silently assumed.
        id: core-image
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME=$(gh api repos/PIVOT-PLATFORM/pivot-collaboratif-core/releases/latest --jq .tag_name)
          if [ -z "${TAG_NAME}" ] || [ "${TAG_NAME}" = "null" ]; then
            echo "::error::Could not resolve pivot-collaboratif-core's latest GitHub Release tag_name — no release published yet?"
            exit 1
          fi
          VERSION="${TAG_NAME#v}"
          echo "::warning::DAST runs against pivot-collaboratif-core's latest RELEASED image (${VERSION}), not the HEAD of its main branch — that repo only publishes images at end-of-sprint release (see its CLAUDE.md, 'Workflow — Release'). Signal here will lag behind pivot-collaboratif-core's own main until it publishes an image on every merge (tracked: TODO-SETUP.md Bloquant #2 / issue #39)."
          echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"

  #
  # JOB 1 - Scan ROLE_USER
  #
  zap-full-user:
    name: ZAP Full Scan - ROLE_USER
    needs: [resolve-core-tag]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    continue-on-error: true
    permissions:
      issues: write
      actions: write
      packages: read

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: pivot_dast
          POSTGRES_USER: pivot
          POSTGRES_PASSWORD: pivot_dast
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U pivot -d pivot_dast"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Login to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve host IP for pivot-collaboratif-core container
        id: host-ip
        run: echo "ip=$(ip route show default | awk '/default/{print $3}')" >> $GITHUB_OUTPUT

      - name: Start pivot-collaboratif-core (DAST seed profile)
        run: |
          docker run -d --name pivot-collaboratif-core \
            -p 8083:8083 \
            -e SPRING_DATASOURCE_URL=jdbc:postgresql://${{ steps.host-ip.outputs.ip }}:5432/pivot_dast \
            -e SPRING_DATASOURCE_USERNAME=pivot \
            -e SPRING_DATASOURCE_PASSWORD=pivot_dast \
            -e SPRING_DATA_REDIS_HOST=${{ steps.host-ip.outputs.ip }} \
            -e SPRING_DATA_REDIS_PORT=6379 \
            -e JWT_SECRET=ci-dast-full-scan-secret-key-for-pivot-application-zap-testing-must-be-64-chars-xxxx \
            -e SPRING_PROFILES_ACTIVE=test,dast-seed \
            ${{ env.CORE_IMAGE }}:${{ needs.resolve-core-tag.outputs.tag }}

      - name: Wait for pivot-collaboratif-core
        run: curl --retry 25 --retry-delay 3 --retry-connrefused --silent --output /dev/null http://localhost:8083/api/collaboratif/actuator/health

      - name: Setup Node.js 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular (CI config — apiUrl http://localhost:8083)
        run: npm run build -- --configuration ci

      - name: Serve Angular build
        run: |
          npx --yes serve dist/frontend/browser -p 4200 --single &
          sleep 3

      - name: Authenticate - ROLE_USER
        id: auth-user
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:8083/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"dast-user@pivot.local","password":"Pivot@DastTest1!"}')
          TOKEN=$(echo "$RESPONSE" | jq -r '.accessToken // .token // empty')
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
          if [ -n "$TOKEN" ]; then
            echo "OK ROLE_USER auth OK"
          else
            echo " ROLE_USER auth KO - scan anonyme"
            echo "DEBUG response: $RESPONSE"
          fi

      - name: Set ZAP auth env - ROLE_USER
        run: |
          echo "ZAP_AUTH_HEADER=Authorization" >> $GITHUB_ENV
          echo "ZAP_AUTH_HEADER_VALUE=Bearer ${{ steps.auth-user.outputs.token }}" >> $GITHUB_ENV
          echo "ZAP_AUTH_HEADER_SITE=http://localhost:4200" >> $GITHUB_ENV

      - name: Grant ZAP container write access to workspace
        run: chmod a+w "$GITHUB_WORKSPACE"

      - name: ZAP Full Scan - ROLE_USER
        uses: zaproxy/action-full-scan@75ee1686750ab1511a73b26b77a2aedd295053ed # v0.12.0
        with:
          target: 'http://localhost:4200'
          rules_file_name: '.github/workflows/configuration/zap-rules.tsv'
          cmd_options: '-j -z "-config scanner.threadPerHost=2"'
          fail_action: false
          issue_title: '[DAST] ZAP Full Scan (ROLE_USER) - alertes'
          token: ${{ secrets.GITHUB_TOKEN }}
          artifact_name: zap-full-user-${{ github.run_number }}

      - name: Upload ZAP report - ROLE_USER
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: zap-report-user-${{ github.run_number }}
          path: |
            report_html.html
            report_json.json
          if-no-files-found: warn
          retention-days: 30

  #
  # JOB 2 - Scan ROLE_ADMIN
  #
  zap-full-admin:
    name: ZAP Full Scan - ROLE_ADMIN
    needs: [resolve-core-tag]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    continue-on-error: true
    permissions:
      issues: write
      actions: write
      packages: read

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: pivot_dast_admin
          POSTGRES_USER: pivot
          POSTGRES_PASSWORD: pivot_dast_admin
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U pivot -d pivot_dast_admin"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Login to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve host IP for pivot-collaboratif-core container
        id: host-ip
        run: echo "ip=$(ip route show default | awk '/default/{print $3}')" >> $GITHUB_OUTPUT

      - name: Start pivot-collaboratif-core (DAST seed profile)
        run: |
          docker run -d --name pivot-collaboratif-core \
            -p 8083:8083 \
            -e SPRING_DATASOURCE_URL=jdbc:postgresql://${{ steps.host-ip.outputs.ip }}:5432/pivot_dast_admin \
            -e SPRING_DATASOURCE_USERNAME=pivot \
            -e SPRING_DATASOURCE_PASSWORD=pivot_dast_admin \
            -e SPRING_DATA_REDIS_HOST=${{ steps.host-ip.outputs.ip }} \
            -e SPRING_DATA_REDIS_PORT=6379 \
            -e JWT_SECRET=ci-dast-full-scan-secret-key-for-pivot-application-zap-testing-must-be-64-chars-xxxx \
            -e SPRING_PROFILES_ACTIVE=test,dast-seed \
            ${{ env.CORE_IMAGE }}:${{ needs.resolve-core-tag.outputs.tag }}

      - name: Wait for pivot-collaboratif-core
        run: curl --retry 25 --retry-delay 3 --retry-connrefused --silent --output /dev/null http://localhost:8083/api/collaboratif/actuator/health

      - name: Setup Node.js 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular (CI config — apiUrl http://localhost:8083)
        run: npm run build -- --configuration ci

      - name: Serve Angular build
        run: |
          npx --yes serve dist/frontend/browser -p 4200 --single &
          sleep 3

      - name: Authenticate - ROLE_ADMIN
        id: auth-admin
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:8083/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"dast-admin@pivot.local","password":"Pivot@DastTest1!"}')
          TOKEN=$(echo "$RESPONSE" | jq -r '.accessToken // .token // empty')
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
          if [ -n "$TOKEN" ]; then
            echo "OK ROLE_ADMIN auth OK"
          else
            echo " ROLE_ADMIN auth KO - scan anonyme"
            echo "DEBUG response: $RESPONSE"
          fi

      - name: Set ZAP auth env - ROLE_ADMIN
        run: |
          echo "ZAP_AUTH_HEADER=Authorization" >> $GITHUB_ENV
          echo "ZAP_AUTH_HEADER_VALUE=Bearer ${{ steps.auth-admin.outputs.token }}" >> $GITHUB_ENV
          echo "ZAP_AUTH_HEADER_SITE=http://localhost:4200" >> $GITHUB_ENV

      - name: Grant ZAP container write access to workspace
        run: chmod a+w "$GITHUB_WORKSPACE"

      - name: ZAP Full Scan - ROLE_ADMIN
        uses: zaproxy/action-full-scan@75ee1686750ab1511a73b26b77a2aedd295053ed # v0.12.0
        with:
          target: 'http://localhost:4200'
          rules_file_name: '.github/workflows/configuration/zap-rules.tsv'
          cmd_options: '-j -z "-config scanner.threadPerHost=2"'
          fail_action: false
          issue_title: '[DAST] ZAP Full Scan (ROLE_ADMIN) - alertes'
          token: ${{ secrets.GITHUB_TOKEN }}
          artifact_name: zap-full-admin-${{ github.run_number }}

      - name: Upload ZAP report - ROLE_ADMIN
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: zap-report-admin-${{ github.run_number }}
          path: |
            report_html.html
            report_json.json
          if-no-files-found: warn
          retention-days: 30
