name: Lighthouse

# Audit accessibilite (WCAG) sur le shell minimal de ce module.
#
# NOTE bootstrap : contrairement au lighthouse.yml de pivot-ui (qui demarre pivot-core reel +
# postgres/redis pour auditer aussi les pages authentifiees), ce squelette n'a ni route, ni
# auth, ni backend a demarrer — une seule page ("/") est auditee. A etendre (stack
# pivot-collaboratif-core + scenario authentifie) une fois de vraies routes/US implementees.

on:
  push:
    branches: [main]
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse — Accessibilité
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      statuses: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node + npm
        uses: ./.github/actions/setup-node

      - name: Install dependencies
        run: npm ci

      - name: Build Angular (production)
        run: npm run build -- --configuration production

      - name: Serve Angular build
        # Projet Angular = "frontend" → dist/frontend/browser (pas dist/pivot-collaboratif-ui).
        run: npx --yes serve dist/frontend/browser -p 4200 --single &

      - name: Wait for frontend
        run: curl --retry 15 --retry-delay 1 --retry-connrefused --silent --output /dev/null http://localhost:4200/

      - name: Install Chrome
        uses: browser-actions/setup-chrome@c785b87e244131f27c9f19c1a33e2ead956ab7ce # v1
        id: setup-chrome

      - name: Run Lighthouse CI
        env:
          LHCI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: |
          # IMPORTANT : le binaire Lighthouse CI vient de @lhci/cli (pinné). `npx lhci`
          # SANS scope installe un package npm tiers homonyme — no-op silencieux.
          npx --yes @lhci/cli@0.15.1 autorun --config=.lighthouserc.json

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: lighthouse-report
          path: lighthouse-reports/
          retention-days: 7
