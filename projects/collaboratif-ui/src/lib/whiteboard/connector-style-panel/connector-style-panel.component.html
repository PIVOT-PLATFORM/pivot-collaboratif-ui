<section class="wb-connector-style" [attr.aria-label]="'whiteboard.connector.style.title' | transloco">
  <h2 class="wb-connector-style__title">{{ 'whiteboard.connector.style.title' | transloco }}</h2>

  <div class="wb-connector-style__field">
    <label class="wb-connector-style__label" for="wbConnStyleShape">
      {{ 'whiteboard.connector.style.shapeLabel' | transloco }}
    </label>
    <select
      id="wbConnStyleShape"
      class="wb-connector-style__control"
      [value]="connection().shape"
      (change)="onShapeChange($event)"
    >
      @for (shape of shapes; track shape) {
        <option [value]="shape">{{ 'whiteboard.connector.style.shape.' + shape | transloco }}</option>
      }
    </select>
  </div>

  <div class="wb-connector-style__field">
    <label class="wb-connector-style__label" for="wbConnStyleArrow">
      {{ 'whiteboard.connector.style.arrowLabel' | transloco }}
    </label>
    <select
      id="wbConnStyleArrow"
      class="wb-connector-style__control"
      [value]="connection().arrow"
      (change)="onArrowChange($event)"
    >
      @for (arrow of arrows; track arrow) {
        <option [value]="arrow">{{ 'whiteboard.connector.style.arrow.' + arrow | transloco }}</option>
      }
    </select>
  </div>

  <div class="wb-connector-style__field wb-connector-style__field--inline">
    <input
      type="checkbox"
      id="wbConnStyleDashed"
      class="wb-connector-style__checkbox"
      [checked]="connection().dashed"
      (change)="onDashedChange($event)"
    />
    <label class="wb-connector-style__label" for="wbConnStyleDashed">
      {{ 'whiteboard.connector.style.dashedLabel' | transloco }}
    </label>
  </div>

  <div class="wb-connector-style__field">
    <label class="wb-connector-style__label" for="wbConnStyleWidth">
      {{ 'whiteboard.connector.style.widthLabel' | transloco }}
    </label>
    <input
      type="number"
      id="wbConnStyleWidth"
      class="wb-connector-style__control"
      min="1"
      max="12"
      step="1"
      [value]="connection().width"
      (change)="onWidthChange($event)"
    />
  </div>

  <div class="wb-connector-style__field">
    <label class="wb-connector-style__label" for="wbConnStyleColor">
      {{ 'whiteboard.connector.style.colorLabel' | transloco }}
    </label>
    <input
      type="color"
      id="wbConnStyleColor"
      class="wb-connector-style__color"
      [value]="connection().color || '#9ca3af'"
      (change)="onColorChange($event)"
    />
  </div>

  <div class="wb-connector-style__field">
    <label class="wb-connector-style__label" for="wbConnStyleLabel">
      {{ 'whiteboard.connector.style.labelFieldLabel' | transloco }}
    </label>
    <input
      type="text"
      id="wbConnStyleLabel"
      class="wb-connector-style__control"
      [value]="connection().label ?? ''"
      [attr.placeholder]="'whiteboard.connector.style.labelPlaceholder' | transloco"
      (change)="onLabelChange($event)"
    />
  </div>
</section>
